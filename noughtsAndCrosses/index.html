<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Noughts and Crosses</title>
</head>
<body>
    <h1>Noughts and Crosses game</h1>
    <p id="playerturn">Player 1's turn (X)</p>
    <div class="grid">
        <div class="cell" id="0" onclick="on_click(event)"></div>
        <div class="cell" id="1" onclick="on_click(event)"></div>
        <div class="cell" id="2" onclick="on_click(event)"></div>
        <div class="cell" id="3" onclick="on_click(event)"></div>
        <div class="cell" id="4" onclick="on_click(event)"></div>
        <div class="cell" id="5" onclick="on_click(event)"></div>
        <div class="cell" id="6" onclick="on_click(event)"></div>
        <div class="cell" id="7" onclick="on_click(event)"></div>
        <div class="cell" id="8" onclick="on_click(event)"></div>
    </div>


    <button onclick="restartGame()">Restart Game</button>

    <p id="message"></p>


<script src="./main.js"></script>    
</body>
</html>
